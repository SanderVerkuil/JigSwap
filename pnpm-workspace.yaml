packages:
  - apps/*
  - packages/*

allowBuilds:
  '@clerk/shared': true
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  nx: true
  sharp: true
  unrs-resolver: true

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@clerk/shared"
  - "@parcel/watcher"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - "@vercel/speed-insights"
  - core-js
  - esbuild
  - nx
  - sharp
  - unrs-resolver
