packages:
  - apps/*
  - packages/*

allowBuilds:
  '@clerk/shared': true
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  nx: true
  sharp: true
  unrs-resolver: true

linkWorkspacePackages: true

# Pin zod: @hookform/resolvers (react-hook-form) is incompatible with zod 4.4's types,
# and a non-frozen install otherwise drifts the ^4.1.13 caret forward. Keep the version
# the whole workspace is built and tested against.
overrides:
  zod: 4.1.13

onlyBuiltDependencies:
  - "@clerk/shared"
  - "@parcel/watcher"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - "@vercel/speed-insights"
  - core-js
  - esbuild
  - nx
  - sharp
  - unrs-resolver
