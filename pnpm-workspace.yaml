packages:
  - apps/*
  - packages/*

allowBuilds:
  "@clerk/shared": true
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  nx: true
  sharp: true
  unrs-resolver: true

linkWorkspacePackages: true

# Pin zod: keep the whole workspace on one zod version that @hookform/resolvers and the
# zodResolver-based forms type-check against. Raised to 4.4.3 alongside resolver 5.4.0.
# Pin less: it's an optional CSS-preprocessor peer of vite (unused here); 4.5.1 added a
# postinstall script that makes `pnpm install` exit non-zero, breaking Nx's pre-install.
# Pin eslint-plugin-react-hooks: 7.1.1 (pulled transitively by eslint-config-next) adds a
# `set-state-in-effect` rule that flags pre-existing, intentional setState-in-effect code
# (useIsMobile, my-puzzles/add). Keep 7.0.1 so `nx lint @jigswap/web` stays 0/0.
overrides:
  zod: 4.4.3
  less: 4.4.0
  eslint-plugin-react-hooks: 7.0.1
  # Security patches for transitive deps flagged by Dependabot — each pins only
  # the vulnerable range to its first patched version (selective overrides).
  # Vite 8 accepts esbuild ^0.27.0 || ^0.28.0, so 0.28.1 is in range.
  # js-yaml is now patched on the v3 line (3.15.0), so gray-matter's js-yaml v3
  # API keeps working; 4.x resolutions are untouched.
  # webpack-dev-server is only an optional peer of @nx/webpack 23 (>=5.2.5), so
  # re-resolving dropped it — and its http-proxy-middleware 2.x / sockjs / uuid
  # subtree — from the lockfile entirely. Their overrides below stay as guards
  # so any future resolution lands on a patched version (uuid 11 still ships
  # CJS; only v13 dropped it).
  esbuild@<0.28.1: ^0.28.1
  form-data@<4.0.6: ^4.0.6
  tmp@<0.2.7: ^0.2.7
  ws@>=8.0.0 <8.21.0: ^8.21.0
  dompurify@<3.4.11: ^3.4.11
  postcss@<8.5.10: ^8.5.10
  qs@>=6.11.1 <6.15.2: ^6.15.2
  undici@>=7.0.0 <7.28.0: ^7.28.0
  http-proxy-middleware@>=3.0.0 <3.0.7: ^3.0.7
  http-proxy-middleware@>=0.16.0 <2.0.10: ^2.0.10
  js-yaml@>=3.0.0 <3.15.0: ^3.15.0
  webpack-dev-server@>=5.0.0 <5.2.5: ^5.2.5
  uuid@<11.1.1: ^11.1.1

onlyBuiltDependencies:
  - "@clerk/shared"
  - "@parcel/watcher"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - "@vercel/speed-insights"
  - core-js
  - esbuild
  - nx
  - sharp
  - unrs-resolver

minimumReleaseAgeExclude:
  - "@clerk/backend@3.7.0 || 3.11.1"
  - "@clerk/react@6.9.1 || 6.12.0"
  - "@clerk/shared@4.17.1 || 4.25.0"
  - "@clerk/tanstack-react-start@1.4.2 || 1.4.14"
  - posthog-js@1.386.6 || 1.398.2
  - "@clerk/localizations@4.13.0"
