name: Mutation Testing

# Runs Stryker over @jigswap/domain on PRs that touch the domain package and
# upserts a single results comment on the PR (identified by a hidden marker,
# updated in place on subsequent pushes). Path-filtered because mutation
# testing is the slowest suite and domain-untouched PRs cannot change scores.
# NOTE: keep this workflow OUT of required status checks — path-filtered
# workflows report no status on PRs that skip them, which would block merges.
on:
  pull_request:
    paths:
      - "packages/domain/**"
      - ".github/workflows/mutation.yml"
      - ".github/scripts/mutation-comment.mjs"

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Stryker (@jigswap/domain)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact-url: ${{ steps.report-artifact.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Nx caching is intentionally skipped: the mutation target is uncacheable
      # (project.json sets cache: false) and nothing else runs here.
      - name: Run mutation tests
        run: pnpm exec nx run @jigswap/domain:mutation

      # Uploaded even on threshold failure so the publish job can still report.
      - name: Upload mutation report (HTML + JSON)
        id: report-artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: packages/domain/reports/mutation/
          if-no-files-found: ignore
          retention-days: 14

  # Write-permissioned work is isolated here and never runs for fork PRs:
  # their GITHUB_TOKEN is read-only anyway, so the guard makes the intent
  # explicit instead of letting pushes fail at runtime. Runs on mutation
  # failure too — a broken threshold should still update the PR comment.
  publish:
    name: Publish report + comment
    needs: mutation
    if: ${{ !cancelled() && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    # Serialize gh-pages pushes across all workflows that deploy reports.
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # May be absent when Stryker crashed before reporting; the render
      # script emits a "no report" comment in that case.
      - name: Download mutation report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mutation-report
          path: packages/domain/reports/mutation/

      # Browsable copy of the report: GitHub artifacts are zip-only, so the
      # HTML report is also published to GitHub Pages under the per-PR dir.
      # keep_files preserves the other reports of this and other PRs.
      # Third-party action pinned to an immutable commit (tag = v4 / v4.1.0):
      # it receives a contents:write token, so a mutable tag would be a
      # supply-chain risk.
      - name: Publish report to GitHub Pages
        id: pages-deploy
        if: ${{ hashFiles('packages/domain/reports/mutation/mutation-report.html') != '' }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/domain/reports/mutation
          destination_dir: pr-${{ github.event.pull_request.number }}/mutation
          keep_files: true
          commit_message: "mutation report for PR #${{ github.event.pull_request.number }}"

      - name: Render comment markdown
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ARTIFACT_URL: ${{ needs.mutation.outputs.artifact-url }}
          PAGES_URL: ${{ steps.pages-deploy.outcome == 'success' && format('https://{0}.github.io/{1}/pr-{2}/mutation/mutation-report.html', github.repository_owner, github.event.repository.name, github.event.pull_request.number) || '' }}
        run: |
          node .github/scripts/mutation-comment.mjs \
            packages/domain/reports/mutation/mutation.json > mutation-comment.md

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- stryker-mutation-report -->';
            const body = fs.readFileSync('mutation-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
