name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch supersedes in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm before setup-node so its pnpm cache can resolve the store. Version is
      # read from the root package.json "packageManager" field (pnpm@11.5.2).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist Nx's computation cache between runs so unchanged projects are replayed.
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: nx-${{ runner.os }}-

      # Convex _generated/* is committed, so no deployment or secrets are needed here.
      - name: Verify (lint, type-check, test, build)
        run: pnpm exec nx run-many -t lint type-check test build
